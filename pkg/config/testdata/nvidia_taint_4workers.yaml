kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sims-nvidia
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
  - role: worker
    image: kindest/node:v1.31.0
    labels:
      sims.io/gpu-vendor: "nvidia"
      nvidia.com/gpu.present: "true"
      nvidia.com/gpu.deploy.dcgm-exporter: "true"
      nvidia.com/gpu.deploy.device-plugin: "true"
      run.ai/simulated-gpu-node-pool: "default"
    taints:
      - key: "nvidia.com/gpu"
        value: "present"
        effect: NoSchedule
  - role: worker
    image: kindest/node:v1.31.0
    labels:
      sims.io/gpu-vendor: "nvidia"
      nvidia.com/gpu.present: "true"
      nvidia.com/gpu.deploy.dcgm-exporter: "true"
      nvidia.com/gpu.deploy.device-plugin: "true"
      run.ai/simulated-gpu-node-pool: "default"
    taints:
      - key: "nvidia.com/gpu"
        value: "present"
        effect: NoSchedule
  - role: worker
    image: kindest/node:v1.31.0
    labels:
      sims.io/gpu-vendor: "nvidia"
      nvidia.com/gpu.present: "true"
      nvidia.com/gpu.deploy.dcgm-exporter: "true"
      nvidia.com/gpu.deploy.device-plugin: "true"
      run.ai/simulated-gpu-node-pool: "default"
    taints:
      - key: "nvidia.com/gpu"
        value: "present"
        effect: NoSchedule
  - role: worker
    image: kindest/node:v1.31.0
    labels:
      sims.io/gpu-vendor: "nvidia"
      nvidia.com/gpu.present: "true"
      nvidia.com/gpu.deploy.dcgm-exporter: "true"
      nvidia.com/gpu.deploy.device-plugin: "true"
      run.ai/simulated-gpu-node-pool: "default"
    taints:
      - key: "nvidia.com/gpu"
        value: "present"
        effect: NoSchedule
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
featureGates:
  DynamicResourceAllocation: true
runtimeConfig:
  resource.k8s.io/v1alpha3: "true"
