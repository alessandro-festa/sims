version: "2"

linters:
  default: standard
  enable:
    - misspell
    - revive
    - unconvert

  settings:
    revive:
      rules:
        - name: exported
          disabled: false
        - name: package-comments
          disabled: true
        - name: var-naming
          arguments:
            - ["ID", "URL", "API", "HTTP", "DRA", "GPU", "MIG", "NVIDIA", "AMD", "CRD", "PSA"]

formatters:
  enable:
    - gofmt
    - goimports
