# Default values for sims-amd.
# Surface values live at the top level; pass-through to the fake-rocm-gpu-
# operator subchart sits under that key. The sims CLI sets both based on
# --gpus-per-worker.

gpusPerNode: 2
productName: MI300X
gpuMemoryBytes: 206158430208   # 192 GiB

# Patch amd.com/gpu capacity onto worker nodes via a post-install Job. The
# device-plugin (Phase 4, default enabled in the operator subchart) is the
# primary capacity source now; the patcher stays as a fallback for clusters
# where the device-plugin can't run (no /var/lib/kubelet/* hostPath access).
# Flip to true to re-enable the Phase-3 behavior.
capacityPatching:
  enabled: false

# Pass-through to fake-rocm-gpu-operator subchart. image.repository points
# at the local registry pkg/cluster.EnsureRegistry brings up — the sims CLI
# pushes the operator image there via `sims gpu load-image`. Standalone
# helm users can override to any reachable registry.
fake-rocm-gpu-operator:
  gpusPerNode: 2
  productName: MI300X
  gpuMemoryBytes: 206158430208
  image:
    repository: localhost:5001/fake-rocm-gpu-operator
    tag: dev
    pullPolicy: IfNotPresent
