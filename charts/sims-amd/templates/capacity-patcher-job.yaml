{{- if .Values.capacityPatching.enabled }}
{{- /*
Fakes amd.com/gpu capacity by patching each worker's status subresource.
This stands in for a real device-plugin until Phase 4 lands fake-rocm-gpu-
operator's device-plugin subcommand; set capacityPatching.enabled=false
then to disable it.

Patches BOTH status.capacity AND status.allocatable. The scheduler binds
pods against allocatable, and kubelet only computes allocatable for
extended resources from device-plugin registrations — so without writing
allocatable explicitly, pods requesting amd.com/gpu would stay Pending
with "Insufficient amd.com/gpu" even though capacity reports the value.

Selects nodes by the sims.io/gpu-vendor=amd label that pkg/config/kind_
config.go writes into the kind cluster manifest. JSON Patch op:add on an
object key is idempotent (it replaces if the key already exists), so
re-running the hook on helm upgrade is safe.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-amd-capacity-patcher
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: amd-capacity-patcher
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sims
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Release.Name }}-amd-capacity-patcher
      containers:
        - name: patcher
          # bitnami/kubectl tags use full semver (1.31.X) — bare 1.31 was
          # never published and the pull fails. Pin to a known-existing tag.
          image: bitnami/kubectl:1.31.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GPUS
              value: "{{ .Values.gpusPerNode }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              NODES=$(kubectl get nodes -l sims.io/gpu-vendor=amd -o name)
              if [ -z "$NODES" ]; then
                echo "no nodes labeled sims.io/gpu-vendor=amd; nothing to patch" >&2
                exit 0
              fi
              for n in $NODES; do
                echo "patching $n with amd.com/gpu=$GPUS (capacity + allocatable)"
                kubectl patch "$n" --subresource=status --type=json -p "[
                  {\"op\":\"add\",\"path\":\"/status/capacity/amd.com~1gpu\",\"value\":\"$GPUS\"},
                  {\"op\":\"add\",\"path\":\"/status/allocatable/amd.com~1gpu\",\"value\":\"$GPUS\"}
                ]"
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
{{- end }}
