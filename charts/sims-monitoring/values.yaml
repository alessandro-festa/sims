# Default values for sims-monitoring.
#
# vendor selects which ServiceMonitor and dashboard ConfigMap are rendered.
# Set by the sims CLI based on the cluster's vendor.
vendor: nvidia   # nvidia | amd

# Pass-through to kube-prometheus-stack subchart. The grafana.* keys
# below land at the subchart's expected path (.Values.grafana.*). A
# previous version of this file had a top-level grafana: block that the
# subchart ignored, leading to an auto-generated admin password.
kube-prometheus-stack:
  grafana:
    # Default sims credentials. Override via --set for anything outside
    # local dev.
    adminUser: admin
    adminPassword: prom-operator
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
