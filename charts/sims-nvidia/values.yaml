# Default values for sims-nvidia.
# Surface values live at the top level; pass-through to the fake-gpu-operator
# subchart sits under that key. The sims CLI sets both based on --gpus-per-worker.

gpusPerNode: 2
gpuProduct: Tesla-T4
gpuMemory: 16384   # MiB

fake-gpu-operator:
  topology:
    nodePools:
      default:
        gpuCount: 2
        gpuProduct: Tesla-T4
        gpuMemory: 16384
  # Both optional NVIDIA subcharts stay disabled — they pull in the real GPU
  # Operator chart and would defeat the point of the fake stack.
  gpuOperator:
    enabled: false
  nvidiaDraDriver:
    enabled: false

# fake-dcgm-extras backfills the DCGM_FI_DEV_* gauges fake-gpu-operator
# doesn't emit (temperature, power, clocks, PCIe, ECC, fan). Without this
# the upstream dashboard's panels for those families stay empty.
extraMetrics:
  enabled: true

fake-dcgm-extras:
  gpusPerNode: 2
  productName: "Tesla T4"
  migProfile: ""
  image:
    repository: ghcr.io/alessandro-festa/fake-dcgm-extras
    tag: "0.1.0"
    pullPolicy: IfNotPresent
