apiVersion: v2
name: sims-nvidia
description: |
  GPU stack for a sims NVIDIA cluster. Wraps run-ai/fake-gpu-operator and adds
  the namespace, PodSecurity labels, and topology defaults expected by sims.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"
keywords:
  - gpu
  - nvidia
  - simulator
  - kind
home: https://github.com/alessandro-festa/sims
sources:
  - https://github.com/alessandro-festa/sims
maintainers:
  - name: alessandro-festa
    url: https://github.com/alessandro-festa
dependencies:
  - name: fake-gpu-operator
    version: 0.0.81
    repository: oci://ghcr.io/run-ai/fake-gpu-operator
  - name: fake-dcgm-extras
    version: 0.1.0
    repository: file://../../operators/fake-dcgm-extras/chart
    condition: extraMetrics.enabled
