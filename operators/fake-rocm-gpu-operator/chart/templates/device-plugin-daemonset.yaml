{{- if .Values.devicePlugin.enabled }}
{{- /*
DaemonSet running the device-plugin subcommand. The container hostPath-
mounts /var/lib/kubelet/device-plugins (read-write — needs to create its
own listening socket + read kubelet.sock for registration) and
/var/lib/kubelet/pod-resources (read-only — for the annotator's
PodResources List calls). Privileged because hostPath into kubelet state
requires it and we're already in a PSA=privileged namespace per
[[feedback-helm-namespace-ownership]].
*/}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amd-device-plugin
  namespace: {{ .Release.Namespace }}
  labels:
    app: amd-device-plugin
    app.kubernetes.io/name: fake-rocm-gpu-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sims
spec:
  selector:
    matchLabels:
      app: amd-device-plugin
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: amd-device-plugin
        app.kubernetes.io/name: fake-rocm-gpu-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: amd-device-plugin
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      priorityClassName: system-node-critical
      containers:
        - name: device-plugin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - device-plugin
            - --gpus-per-node={{ .Values.gpusPerNode }}
            - --resource-name={{ .Values.devicePlugin.resourceName }}
            - --kubelet-socket-dir=/var/lib/kubelet/device-plugins
            - --pod-resources-socket=/var/lib/kubelet/pod-resources/kubelet.sock
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            # Root is required to bind on /var/lib/kubelet/device-plugins/.
            # PSA=privileged on the gpu-operator namespace allows this; see
            # [[feedback-helm-namespace-ownership]].
            privileged: true
            runAsUser: 0
            runAsGroup: 0
          resources:
            {{- toYaml .Values.devicePlugin.resources | nindent 12 }}
          volumeMounts:
            - name: kubelet-device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
      volumes:
        - name: kubelet-device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: pod-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
            type: Directory
{{- end }}
