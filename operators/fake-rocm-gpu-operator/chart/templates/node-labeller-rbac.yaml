{{- if .Values.nodeLabeller.enabled }}
{{- /*
RBAC for the node-labeller. Needs nodes:patch cluster-wide (each DS pod
patches its own node's labels at startup, then sleeps).
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amd-node-labeller
  namespace: {{ .Release.Namespace }}
  labels:
    app: amd-node-labeller
    app.kubernetes.io/name: fake-rocm-gpu-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sims
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-amd-node-labeller
  labels:
    app: amd-node-labeller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sims
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-amd-node-labeller
  labels:
    app: amd-node-labeller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sims
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-amd-node-labeller
subjects:
  - kind: ServiceAccount
    name: amd-node-labeller
    namespace: {{ .Release.Namespace }}
{{- end }}
