{{- if .Values.nodeLabeller.enabled }}
{{- /*
node-labeller runs as a DS so every GPU node gets the AMD product/CU/
SIMD/family/VRAM labels. Each pod patches its own node, then sleeps
until SIGTERM (kubelet keeps the pod Running so the DS reports Healthy).
*/}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amd-node-labeller
  namespace: {{ .Release.Namespace }}
  labels:
    app: amd-node-labeller
    app.kubernetes.io/name: fake-rocm-gpu-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: sims
spec:
  selector:
    matchLabels:
      app: amd-node-labeller
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: amd-node-labeller
        app.kubernetes.io/name: fake-rocm-gpu-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: amd-node-labeller
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-labeller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - node-labeller
            - --product-name={{ .Values.productName }}
            - --cu-count={{ .Values.nodeLabeller.cuCount }}
            - --simd-count={{ .Values.nodeLabeller.simdCount }}
            - --device-id={{ .Values.nodeLabeller.deviceID }}
            - --family={{ .Values.nodeLabeller.family }}
            - --vram={{ .Values.nodeLabeller.vram }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.nodeLabeller.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
{{- end }}
