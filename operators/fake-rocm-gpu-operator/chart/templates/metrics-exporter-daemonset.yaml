apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: amd-device-metrics-exporter
  labels:
    {{- include "fake-rocm-gpu-operator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "fake-rocm-gpu-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fake-rocm-gpu-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: amd-device-metrics-exporter
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: metrics-exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - metrics-exporter
            - --listen=:{{ .Values.service.port }}
            - --gpus-per-node={{ .Values.gpusPerNode }}
            - --product-name={{ .Values.productName }}
            - --memory-bytes={{ int64 .Values.gpuMemoryBytes }}
            - --topology-namespace={{ .Release.Namespace }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: gpu-metrics
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: gpu-metrics
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: gpu-metrics
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
