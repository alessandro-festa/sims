# Default values for fake-rocm-gpu-operator. The sims CLI overrides
# gpusPerNode/productName/gpuMemoryBytes from --gpus-per-worker.

image:
  repository: fake-rocm-gpu-operator
  tag: dev
  pullPolicy: IfNotPresent

# Per-node fake GPU configuration.
gpusPerNode: 2
productName: MI300X
gpuMemoryBytes: 206158430208   # 192 GiB

# DaemonSet placement. sims kind workers carry sims.io/gpu-vendor=amd; bare
# helm installs against real clusters can override this to label their nodes.
nodeSelector:
  sims.io/gpu-vendor: amd

tolerations: []

# Metrics endpoint port. Service name is fixed at amd-device-metrics-exporter
# so the sims-monitoring ServiceMonitor target stays stable.
service:
  port: 5000

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Device-plugin: kubelet-facing gRPC server that advertises amd.com/gpu
# capacity and lets pods actually be admitted (vs the Phase 3 capacity-
# patcher Job which only set node-status fields, leaving the kubelet
# without an allocator). Phase 4 default = enabled.
devicePlugin:
  enabled: true
  resourceName: amd.com/gpu
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# status-updater: single-replica Deployment that watches pods cluster-
# wide + maintains the topology ConfigMap mapping GPUs to the pods that
# hold them. The metrics-exporter reads that CM on every scrape to add
# pod/namespace/container labels.
statusUpdater:
  enabled: true
  reconcileInterval: 5s
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# node-labeller: DaemonSet that patches each GPU node with the AMD
# product / CU / SIMD / family / VRAM labels real ROCm/gpu-operator
# emits. productName is inherited from the top-level value.
nodeLabeller:
  enabled: true
  cuCount: 304
  simdCount: 1216
  deviceID: "0x74a1"
  family: MI300
  vram: 192GB
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 64Mi
