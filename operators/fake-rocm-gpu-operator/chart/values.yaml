# Default values for fake-rocm-gpu-operator. The sims CLI overrides
# gpusPerNode/productName/gpuMemoryBytes from --gpus-per-worker.

image:
  repository: ghcr.io/alessandro-festa/fake-rocm-gpu-operator
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Per-node fake GPU configuration. These flow through the controller
# subcommand's flags to every child workload (device-plugin, metrics-
# exporter, status-updater, node-labeller).
gpusPerNode: 2
productName: MI300X
gpuMemoryBytes: 206158430208   # 192 GiB

# Default nodeSelector applied to child workloads when the DeviceConfig
# CR's spec doesn't set its own. sims kind workers carry
# sims.io/gpu-vendor=amd; standalone helm installs against real clusters
# can override this. The controller serializes this to a flag — keep it
# to a single label pair, multi-label support requires CR overrides.
nodeSelector:
  sims.io/gpu-vendor: amd

tolerations: []

# Metrics endpoint port for the metrics-exporter Service the controller
# creates.
service:
  port: 5000

# Whether the chart templates a default DeviceConfig CR. With this true
# (the default), `helm install` immediately spins up the four workloads
# via the controller. Set to false if you want to apply your own CR
# (e.g., to test a real ROCm/gpu-operator DeviceConfig manifest).
deviceConfig:
  create: true

# Device-plugin: kubelet-facing gRPC server that advertises amd.com/gpu
# capacity. `.enabled` controls whether the default DeviceConfig CR turns
# it on (Phase 4 default = true). To disable at runtime, edit the CR's
# spec.devicePlugin.enable.
devicePlugin:
  enabled: true
  resourceName: amd.com/gpu

# CPX/SPX compute-partition emulation (#48). SPX (default) presents each
# physical GPU as 1 device. CPX presents each physical GPU as `count`
# logical partitions — useful for tooling that exercises AMD's MI300X
# partition workflow against sims. The default DeviceConfig CR forwards
# these values; edit the CR directly to switch modes at runtime.
computePartition:
  mode: spx     # spx | cpx
  count: 1      # 1..8; ignored when mode=spx

# Controller (DeviceConfig reconciler) — the new Phase 6 workload.
controller:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
